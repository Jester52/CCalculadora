<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculadora Pro</title>
    <style>
        :root { --bg-color: #000; --text-color: #fff; --btn-gray: #333; --btn-light: #a5a5a5; --btn-orange: #ff9f0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        html, body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; position: fixed;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
            padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
        }

        .display {
            padding: 0 30px 10px 30px;
            text-align: right;
            font-size: 90px;
            font-weight: 300;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            padding: 0 18px;
        }

        button {
            border: none;
            border-radius: 50%;
            aspect-ratio: 1 / 1;
            font-size: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:active { filter: brightness(1.5); }

        .btn-num { background-color: var(--btn-gray); color: white; }
        .btn-spec { background-color: var(--btn-light); color: black; font-size: 28px; }
        .btn-op { background-color: var(--btn-orange); color: white; font-size: 40px; }
        .btn-zero { grid-column: span 2; aspect-ratio: auto; border-radius: 100px; justify-content: flex-start; padding-left: 30px; }

        /* Panel Config */
        #admin-panel { display: none; position: absolute; top: 15%; left: 50%; transform: translateX(-50%); background: #222; padding: 20px; border-radius: 20px; z-index: 1000; width: 80%; border: 1px solid #444; text-align: center; }
        #admin-panel input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 18px; }

        #magic-indicator { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 4px; background: #333; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="magic-indicator"></div>
    <div id="btn-back-menu" style="position: absolute; top: 0; right: 0; width: 80px; height: 80px; z-index: 999;"></div>
    <div style="position:absolute; top:0; left:0; width:80px; height:80px; z-index:999;" onclick="abrirConfig()"></div>

    <div id="admin-panel">
        <h2 style="margin:0; color:var(--btn-orange);">CONFIGURAR</h2>
        <input type="number" id="valForzado" placeholder="Número">
        <button onclick="cerrarConfig()" style="width:100%; height:45px; border-radius:10px; background:var(--btn-orange); color:white; font-size:18px; font-weight:bold; aspect-ratio: auto;">GUARDAR</button>
    </div>

    <div class="app-container">
        <div class="display" id="screen">0</div>
        
        <div class="grid">
            <button class="btn-spec" onclick="backspace()">⌫</button>
            <button class="btn-spec" onclick="resetCalc()">AC</button>
            <button class="btn-spec" onclick="handleMagicTrigger()">%</button>
            <button class="btn-op" onclick="setOp('/')">÷</button>
            <button class="btn-num" onclick="numClick('7')">7</button>
            <button class="btn-num" onclick="numClick('8')">8</button>
            <button class="btn-num" onclick="numClick('9')">9</button>
            <button class="btn-op" onclick="setOp('*')">×</button>
            <button class="btn-num" onclick="numClick('4')">4</button>
            <button class="btn-num" onclick="numClick('5')">5</button>
            <button class="btn-num" onclick="numClick('6')">6</button>
            <button class="btn-op" onclick="setOp('-')">-</button>
            <button class="btn-num" onclick="numClick('1')">1</button>
            <button class="btn-num" onclick="numClick('2')">2</button>
            <button class="btn-num" onclick="numClick('3')">3</button>
            <button class="btn-op" onclick="setOp('+')">+</button>
            <button class="btn-num" onclick="toggleSign()">+/-</button>
            <button class="btn-num" onclick="numClick('0')">0</button>
            <button class="btn-num" onclick="numClick('.')">,</button>
            <button class="btn-op" onclick="calcular()">=</button>
        </div>
    </div>

    <script>
        let currentInput = "0", previousInput = "", operation = null;
        let n1 = 0, n2 = 0, modoMagico = false, contadorOps = 0;
        let digitosDif = [], idxDif = 0, clicksPorc = 0;

        function updateScreen() {
            const s = document.getElementById('screen');
            s.innerText = currentInput;
            s.style.fontSize = currentInput.length > 7 ? "55px" : "90px";
        }

        function abrirConfig() {
            document.getElementById('valForzado').value = localStorage.getItem('activeForce') || "";
            document.getElementById('admin-panel').style.display = 'block';
        }

        function cerrarConfig() {
            localStorage.setItem('activeForce', document.getElementById('valForzado').value);
            document.getElementById('admin-panel').style.display = 'none';
        }

        function handleMagicTrigger() {
            clicksPorc++;
            if (clicksPorc === 2) {
                modoMagico = true;
                document.getElementById('magic-indicator').style.opacity = "1";
                if(navigator.vibrate) navigator.vibrate(50);
            }
            setTimeout(() => { clicksPorc = 0; }, 800);
        }

        function numClick(val) {
            if (modoMagico && contadorOps === 2) {
                if (idxDif < digitosDif.length) {
                    if (idxDif === 0) currentInput = "";
                    currentInput += digitosDif[idxDif];
                    idxDif++;
                }
            } else {
                if (currentInput === "0" && val !== ".") currentInput = val;
                else currentInput += val;
            }
            updateScreen();
        }

        function setOp(op) {
            if (modoMagico) {
                const target = parseFloat(localStorage.getItem('activeForce')) || 0;
                contadorOps++;
                if (contadorOps === 1) { n1 = parseFloat(currentInput); currentInput = "0"; }
                else if (contadorOps === 2) {
                    n2 = parseFloat(currentInput);
                    let dif = target - (n1 + n2);
                    digitosDif = dif.toString().split('');
                    idxDif = 0; currentInput = "0";
                }
            } else {
                operation = op; previousInput = currentInput; currentInput = "0";
            }
            updateScreen();
        }

        function calcular() {
            if (modoMagico && contadorOps >= 2) {
                currentInput = localStorage.getItem('activeForce') || "0";
                modoMagico = false; contadorOps = 0;
                document.getElementById('magic-indicator').style.opacity = "0";
            } else {
                let res = eval(previousInput + (operation || "+") + currentInput);
                currentInput = res.toString();
                operation = null;
            }
            updateScreen();
        }

        function resetCalc() {
            currentInput = "0"; previousInput = ""; operation = null;
            modoMagico = false; contadorOps = 0;
            document.getElementById('magic-indicator').style.opacity = "0";
            updateScreen();
        }

        function backspace() { 
            currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : "0"; 
            updateScreen(); 
        }


        function toggleSign() { currentInput = (parseFloat(currentInput) * -1).toString(); updateScreen(); }

        let timerBack;
        document.getElementById('btn-back-menu').addEventListener('touchstart', () => {
            timerBack = setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        });
        document.getElementById('btn-back-menu').addEventListener('touchend', () => clearTimeout(timerBack));
    </script>
</body>
</html>
