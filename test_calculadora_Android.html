<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculadora</title>
    <style>
        :root {
            --bg-android: #000000;
            --text-main: #e5e3e1;
            --btn-num: #1c1d1f;
            --btn-op: #1c1d1f;
            --accent-blue: #004a77;
            --magic-glow: #7b7a7e;
        }

        * {
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            touch-action: none; 
            }
        
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-android);
            font-family: 'Roboto', sans-serif;
            position: fixed; /* Clava la pantalla */
            touch-action: none; /* Evita que el dedo arrastre la página */
        }

        /* BLOQUEO TOTAL DE SCROLL */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            touch-action: none; /* Desactiva gestos de zoom y scroll del navegador */
        }

        #magic-line {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 40%; height: 2px; background-color: var(--magic-glow);
            z-index: 100; opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }

        .secret-zone {
            position: absolute; top: 0;
            width: 60px;
            height: 60px;
            z-index: 1000;
        }
        #config-btn { left: 0; }
        #exit-btn { right: 0; }

        .app-container {
            height: 100%; /* Usa el 100% real del body fixed */
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .display {
            flex: 1; /* Esto hará que el visor ocupe solo el espacio libre */
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 15px 25px; /* Reducimos padding para ganar espacio */
            min-height: 0; 
        }


        #screen {
            font-size: 88px; /* Reducido de 75 a 60 para evitar que empuje */
            font-weight: 300;
            color: var(--text-main);
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            /*width: 100%;*/
            line-height: 1;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px; /* Gap más pequeño para compactar */
            padding: 10px 15px 35px 15px; /* Padding inferior para alejar de la barra de Android */
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-android); /* Asegura fondo negro tras los botones */
            
        }

        button {
            border: none;
            border-radius: 16px; /* Bordes ligeramente menos curvos ahorran espacio visual */
            height: 17vw; /* Altura dinámica basada en el ancho */
            max-height: 75px; /* Límite para pantallas muy grandes */
            font-size: 26px;
            background-color: var(--btn-num);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-top { color: #8ab4f8; font-weight: bold; font-size: 22px; }

        .btn-equal { 
            background-color: var(--accent-blue) !important;
            color: white !important;
            grid-row: span 2;      /* Mantiene el estilo alargado de Android */
            height: auto;          /* Deja que el grid controle la altura */
            max-height: 150px;     /* Pero le pone un límite para que no se vea gigante */
            font-size: 32px;       /* Tamaño del símbolo = */
            border-radius: 28px;   /* Curvatura de las esquinas */
        }

        button:active { filter: brightness(1.4); }
    </style>
</head>
<body>

    <div id="magic-line"></div>
    <div id="config-btn" class="secret-zone" onclick="abrirConfig()"></div>
    <div id="exit-btn" class="secret-zone"></div>

    <div class="app-container">
        <div class="display">
            <div id="screen">0</div>
        </div>

        <div class="numpad">

            <button class="btn-mem" onclick="mem('MC')">MC</button>
            <button class="btn-mem" onclick="mem('M+')">M+</button>
            <button class="btn-mem" onclick="mem('M-')">M-</button>
            <button class="btn-mem" onclick="mem('MR')">MR</button>

            <button class="btn-top" onclick="reset()">C</button>
            <button class="btn-top" onclick="op('/')">÷</button>
            <button class="btn-top" onclick="op('*')">×</button>
            <button class="btn-top" onclick="del()">⌫</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="btn-top" onclick="op('-')">−</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="btn-top" onclick="op('+')">+</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button class="btn-equal" onclick="calc()">=</button>

            <button onclick="magic()">%</button>
            <button onclick="press('0')">0</button>
            <button onclick="press('.')">,</button>
        </div>
    </div>

    <script>
        let cur = "", pre = "", oper = null;
        let n1 = 0, n2 = 0, magicMode = false, step = 0;
        let diffArr = [], diffIdx = 0, mClicks = 0, mTimer = null;
        
        const screenEl = document.getElementById('screen');
        const magicLine = document.getElementById('magic-line');

        function updateDisplay(val) {
            screenEl.innerText = val || "0";
        }

        function press(v) {
            if (magicMode && step === 2) {
                if (diffIdx < diffArr.length) { 
                    if (diffIdx === 0) cur = ""; // Limpia al empezar el truco
                    cur += diffArr[diffIdx]; 
                    diffIdx++; 
                }
            } else { 
                // Si el número es 0, lo reemplazamos por el nuevo toque
                if (cur === "0" || cur === "") {
                    cur = v;
                } else {
                    cur += v;
                }
            }
            updateDisplay(cur);
        }
        function op(o) {
            if (magicMode) {
                step++;
                if (step === 1) { 
                    n1 = parseFloat(cur || 0); 
                    cur = ""; 
                } else if (step === 2) {
                    n2 = parseFloat(cur || 0);
                    // Acceso directo al número configurado
                    let target = parseFloat(localStorage.getItem('activeForce')) || 0;
                    // Lógica: Target = (n1 + n2) + diff -> diff = Target - (n1 + n2)
                    let diff = target - (n1 + n2);
                    diffArr = diff.toString().split('');
                    diffIdx = 0; 
                    cur = "";
                }
            } else { 
                oper = o; 
                pre = cur; 
                cur = ""; 
            }
            updateDisplay(cur);
        }

        function calc() {
            if (magicMode && step >= 2) {
                // El resultado final ES el número forzado
                cur = localStorage.getItem('activeForce') || "0";
                magicMode = false; 
                step = 0;
                if (magicLine) magicLine.style.opacity = "0";
            } else {
                try { 
                    // Cálculo normal
                    cur = eval(pre + oper + (cur || "0")).toString(); 
                } catch(e) { 
                    cur = "0"; 
                }
            }
            updateDisplay(cur);
            pre = ""; oper = null;
        }

        function magic() {
            mClicks++;
            clearTimeout(mTimer);
            mTimer = setTimeout(() => { mClicks = 0; }, 800);

            if (mClicks === 2) {
                magicMode = true;
                if (magicLine) magicLine.style.opacity = "0.6"; // Brillo de confirmación
                
                if (navigator.vibrate) {
                    navigator.vibrate([60, 50, 60]); // Latido táctil
                }
                
                mClicks = 0;
            }
        }

        function reset() { 
            cur = ""; pre = ""; oper = null; magicMode = false; step = 0; 
            if (magicLine) magicLine.style.opacity = "0"; 
            updateDisplay("0"); 
        }

        function del() { 
            cur = cur.slice(0, -1); 
            updateDisplay(cur); 
        }
        
        function abrirConfig() {
            let actual = localStorage.getItem('activeForce') || "";
            let v = prompt("Número a forzar (Input solicitado):", actual);
            if(v !== null && v !== "") {
                localStorage.setItem('activeForce', v);
                // Pequeña vibración de confirmación al guardar
                if (navigator.vibrate) navigator.vibrate(100);
            }
        }

        // Sistema de salida al menú por toque largo (2 segundos)
        let holdTimer;
        const exitArea = document.getElementById('exit-btn');
        if (exitArea) {
            exitArea.addEventListener('touchstart', (e) => {
                e.preventDefault(); 
                holdTimer = setTimeout(() => { 
                    window.location.assign('index.html'); 
                }, 2000);
            }, {passive: false});

            exitArea.addEventListener('touchend', () => clearTimeout(holdTimer));
            exitArea.addEventListener('touchcancel', () => clearTimeout(holdTimer));
        }

        function mem(type) {
            let n = parseFloat(cur);
            if(type === 'MC') memoria = 0;
            if(type === 'M+') memoria += n;
            if(type === 'M-') memoria -= n;
            if(type === 'MR') cur = memoria.toString();
            if(navigator.vibrate) navigator.vibrate(30);
            updateDisplay();
        }

        
    </script>
</body>
</html>
