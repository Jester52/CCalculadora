<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculadora">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculadora</title>
    <style>
        :root {
            --bg-android: #000000;
            --text-main: #e5e3e1;
            --btn-num: #1c1d1f;
            --btn-op: #1c1d1f;
            --btn-func: #43474e;
            --accent-blue: #004a77;
            --text-dim: #9ea1a5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-android);
            position: fixed;
            font-family: 'Roboto', sans-serif;
            touch-action: none;
        }

        /* Línea secreta de activación */
        #magic-line {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30%;
            height: 2px;
            background-color: var(--accent-blue);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .app-container {
            height: 100svh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Empuja todo hacia abajo */
        }

        /* Visor: Ocupa todo el espacio de arriba */
        .display {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 20px 30px;
        }

        #screen {
            font-size: 75px;
            font-weight: 300;
            color: var(--text-main);
            margin: 0;
            min-height: 1.1em;
            text-align: right;
        }

        /* Teclado: Sin huecos inferiores */
        .numpad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 10px 15px calc(env(safe-area-inset-bottom) + 15px) 15px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        button {
            border: none;
            border-radius: 18px;
            aspect-ratio: 1.1 / 1; /* Un poco más anchos que altos como en Samsung */
            font-size: 24px;
            background-color: var(--btn-num);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Botones de memoria (Fila superior teclado) */
        .btn-mem { 
            background: transparent; 
            color: var(--text-dim); 
            font-size: 18px; 
            aspect-ratio: 1.5 / 1;
        }

        .btn-op { background-color: var(--btn-op); color: #d2e4ff; font-size: 28px; }
        .btn-func { background-color: var(--btn-func); color: #8ab4f8; }
        .btn-top {background-color: var(--btn-op); color: #165780; font-size: 28px;font-weight: bold;}
        
        .btn-equal { 
            background-color: var(--accent-blue) !important;
            color: white !important;
            grid-row: span 2;
            aspect-ratio: auto;
            border-radius: 25px;
        }

        button:active { filter: brightness(1.4); }

        /* Botones invisibles de control */
        #exit-btn { position: absolute; top: 0; right: 0; width: 80px; height: 80px; z-index: 10; }
        #config-btn { position: absolute; top: 0; left: 0; width: 80px; height: 80px; z-index: 10; }
    </style>
</head>
<body>

    <div id="magic-line"></div>
    <div id="exit-btn"></div>
    <div id="config-btn" onclick="abrirConfig()"></div>

    <div class="app-container">
        <div class="display">
            <div id="screen"></div>
        </div>

        <div class="numpad">
            <button class="btn-mem">MC</button>
            <button class="btn-mem">M+</button>
            <button class="btn-mem">M-</button>
            <button class="btn-mem">MR</button>

            <button class="btn-top" onclick="reset()">C</button>
            <button class="btn-top" onclick="op('/')">÷</button>
            <button class="btn-top" onclick="op('*')">×</button>
            <button class="btn-top" onclick="del()">⌫</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="btn-top" onclick="op('-')">−</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="btn-top" onclick="op('+')">+</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button class="btn-equal" onclick="calc()">=</button>

            <button onclick="magic()">%</button>
            <button onclick="press('0')">0</button>
            <button onclick="press('.')">,</button>
        </div>
    </div>

    <script>
        let cur = "", pre = "", oper = null;
        let n1 = 0, n2 = 0, magicMode = false, step = 0;
        let diffArr = [], diffIdx = 0, mClicks = 0;
        
        const displayEl = document.getElementById('screen');
        const magicLine = document.getElementById('magic-line');

        function press(v) {
            if (magicMode && step === 2) {
                if (diffIdx < diffArr.length) { cur += diffArr[diffIdx]; diffIdx++; }
            } else { cur += v; }
            displayEl.innerText = cur;
        }

        function op(o) {
            if (magicMode) {
                step++;
                if (step === 1) { n1 = parseFloat(cur || 0); cur = ""; }
                else if (step === 2) {
                    n2 = parseFloat(cur || 0);
                    let target = parseFloat(localStorage.getItem('forceVal')) || 0;
                    diffArr = (target - (n1 + n2)).toString().split('');
                    diffIdx = 0; cur = "";
                }
            } else { oper = o; pre = cur; cur = ""; }
            displayEl.innerText = cur;
        }

        function calc() {
            if (magicMode && step >= 2) {
                cur = localStorage.getItem('forceVal') || "0";
                magicMode = false; step = 0;
                magicLine.style.opacity = "0";
            } else {
                try { cur = eval(pre + oper + cur).toString(); } catch(e) { cur = ""; }
            }
            displayEl.innerText = cur;
        }

        function magic() {
                    mClicks++;
                    // Al detectar el segundo toque en el botón %
                    if (mClicks === 2) {
                        magicMode = true; // Activa el sistema de forzado
                        
                        // Muestra la línea azul sutil en la parte superior
                        if (magicLine) {
                            magicLine.style.opacity = "0.4";
                        }
                        
                        // Confirmación táctil para el mentalista:
                        // Vibra 60ms, descansa 50ms, vibra 60ms
                        if (navigator.vibrate) {
                            navigator.vibrate([60, 50, 60]);
                        }
                        
                        mClicks = 0; // Reinicia el contador de clics
                    }
        }

        function reset() { cur = ""; magicMode = false; step = 0; magicLine.style.opacity = "0"; displayEl.innerText = cur; }
        function del() { cur = cur.slice(0, -1); displayEl.innerText = cur; }
        
        function abrirConfig() {
            let v = prompt("Número a forzar:", localStorage.getItem('forceVal') || "");
            if(v !== null) localStorage.setItem('forceVal', v);
        }

        // Salida al menú con toque largo
        let t;
        document.getElementById('exit-btn').addEventListener('touchstart', () => {
            t = setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        });
        document.getElementById('exit-btn').addEventListener('touchend', () => clearTimeout(t));
    </script>
</body>
</html>
