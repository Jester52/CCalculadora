<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculadora">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculadora</title>
    <style>
        :root {
            --bg-android: #000000;
            --text-main: #e5e3e1;
            --btn-num: #1c1d1f;
            --btn-op: #1c1d1f;
            --btn-func: #43474e;
            --accent-blue: #004a77;
            --text-dim: #9ea1a5;
            --magic-glow: #007bff; /* Azul neón para la línea */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-android);
            position: fixed;
            font-family: 'Roboto', sans-serif;
            touch-action: none;
        }

        /* LÍNEA MÁGICA: AJUSTE DEFINITIVO */
        #magic-line {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%; /* Un poco más larga */
            height: 4px; /* Un poco más gruesa */
            background-color: var(--magic-glow);
            box-shadow: 0 0 8px var(--magic-glow); /* Efecto neón para que la veas */
            z-index: 100000; /* Por encima de TODO */
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        /* ZONAS TÁCTILES SECRETAS */
        .secret-zone {
            position: absolute;
            top: 0;
            width: 80px;
            height: 80px;
            z-index: 99999;
            background: rgba(255, 255, 255, 0.01); 
        }
        #exit-btn { right: 0; }
        #config-btn { left: 0; }

        .app-container {
            height: 100svh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            z-index: 1;
        }

        .display {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 20px 30px;
        }

        #screen {
            font-size: 75px;
            font-weight: 300;
            color: var(--text-main);
            margin: 0;
            min-height: 1.1em;
            text-align: right;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 10px 15px calc(env(safe-area-inset-bottom) + 15px) 15px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        button {
            border: none;
            border-radius: 18px;
            aspect-ratio: 1.1 / 1;
            font-size: 24px;
            background-color: var(--btn-num);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-mem { background: transparent; color: var(--text-dim); font-size: 18px; aspect-ratio: 1.5 / 1; }
        .btn-top { background-color: var(--btn-op); color: #8ab4f8; font-size: 28px; font-weight: bold; }
        .btn-equal { background-color: var(--accent-blue) !important; color: white !important; grid-row: span 2; aspect-ratio: auto; border-radius: 25px; }

        button:active { filter: brightness(1.4); }
    </style>
</head>
<body>

    <div id="magic-line"></div>
    <div id="config-btn" class="secret-zone" onclick="abrirConfig()"></div>
    <div id="exit-btn" class="secret-zone"></div>

    <div class="app-container">
        <div class="display">
            <div id="screen">0</div>
        </div>

        <div class="numpad">
            <button class="btn-mem">MC</button><button class="btn-mem">M+</button>
            <button class="btn-mem">M-</button><button class="btn-mem">MR</button>

            <button class="btn-top" onclick="reset()">C</button>
            <button class="btn-top" onclick="op('/')">÷</button>
            <button class="btn-top" onclick="op('*')">×</button>
            <button class="btn-top" onclick="del()">⌫</button>

            <button onclick="press('7')">7</button><button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button><button class="btn-top" onclick="op('-')">−</button>

            <button onclick="press('4')">4</button><button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button><button class="btn-top" onclick="op('+')">+</button>

            <button onclick="press('1')">1</button><button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button><button class="btn-equal" onclick="calc()">=</button>

            <button onclick="magic()">%</button><button onclick="press('0')">0</button>
            <button onclick="press('.')">,</button>
        </div>
    </div>

    <script>
        let cur = "", pre = "", oper = null;
        let n1 = 0, n2 = 0, magicMode = false, step = 0;
        let diffArr = [], diffIdx = 0, mClicks = 0, mTimer = null;
        
        const displayEl = document.getElementById('screen');
        const magicLine = document.getElementById('magic-line');

        function updateScreen(v) { 
            if(displayEl) displayEl.innerText = v || "0"; 
        }

        function press(v) {
            if (magicMode && step === 2) {
                if (diffIdx < diffArr.length) { cur += diffArr[diffIdx]; diffIdx++; }
            } else { cur += v; }
            updateScreen(cur);
        }

        function op(o) {
            if (magicMode) {
                step++;
                if (step === 1) { n1 = parseFloat(cur || 0); cur = ""; }
                else if (step === 2) {
                    n2 = parseFloat(cur || 0);
                    let target = parseFloat(localStorage.getItem('forceVal')) || 0;
                    diffArr = (target - (n1 + n2)).toString().split('');
                    diffIdx = 0; cur = "";
                }
            } else { oper = o; pre = cur; cur = ""; }
            updateScreen(cur);
        }

        function calc() {
            if (magicMode && step >= 2) {
                cur = localStorage.getItem('forceVal') || "0";
                magicMode = false; step = 0;
                if (magicLine) magicLine.style.opacity = "0";
            } else {
                try { cur = eval(pre + oper + (cur || "0")).toString(); } catch(e) { cur = "0"; }
            }
            updateScreen(cur);
        }

        function magic() {
            mClicks++;
            clearTimeout(mTimer);
            mTimer = setTimeout(() => { mClicks = 0; }, 800);

            if (mClicks === 2) {
                magicMode = true;
                if (magicLine) {
                    magicLine.style.opacity = "0.7"; // Aumentado para visibilidad
                }
                
                if (navigator.vibrate) {
                    navigator.vibrate([60, 50, 60]);
                }
                mClicks = 0;
            }
        }

        function reset() { 
            cur = ""; magicMode = false; step = 0; 
            if (magicLine) magicLine.style.opacity = "0"; 
            updateScreen("0"); 
        }

        function del() { cur = cur.slice(0, -1); updateScreen(cur); }
        
        function abrirConfig() {
            let v = prompt("Número a forzar:", localStorage.getItem('forceVal') || "");
            if(v !== null) localStorage.setItem('forceVal', v);
        }

        // SALIDA REFORZADA
        let holdT;
        const exB = document.getElementById('exit-btn');
        if (exB) {
            exB.addEventListener('touchstart', (e) => {
                e.preventDefault();
                holdT = setTimeout(() => { window.location.assign('index.html'); }, 2000);
            });
            exB.addEventListener('touchend', () => clearTimeout(holdT));
        }
    </script>
</body>
</html>
