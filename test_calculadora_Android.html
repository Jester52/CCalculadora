<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="Calculadora">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculadora</title>
    <style>
        :root {
            --bg-android: #f7f9fc;
            --text-main: #1a1c1e;
            --btn-num: #e1e2e5;
            --btn-op: #c2e7ff;
            --btn-func: #dae2f0;
            --accent: #004a77;
            /* Esta variable la llenará JS con la altura exacta */
            --vh: 1vh; 
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-android: #1a1c1e;
                --text-main: #e5e3e1;
                --btn-num: #2e3033;
                --btn-op: #004a77;
                --btn-func: #43474e;
                --accent: #d2e4ff;
            }
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            touch-action: none; /* Bloqueo total de gestos del navegador */
        }
        
        html, body {
            /* Usamos la variable calculada por JS */
            height: calc(var(--vh, 1vh) * 100);
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-android);
            position: fixed;
            font-family: 'Roboto', sans-serif;
        }

        /* CONTENEDOR ANCLADO AL BORDE INFERIOR */
        .app-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(var(--vh, 1vh) * 100);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* VISOR: Ocupa el espacio superior de forma contenida */
        .display-container {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 0 32px 10px 32px;
            max-height: 35%; /* Nunca más del 35% de la altura real */
        }

        #screen {
            font-size: clamp(50px, 15vw, 85px);
            font-weight: 300;
            color: var(--text-main);
            margin: 0;
            line-height: 1;
        }

        /* TECLADO: Tamaño controlado para asegurar el 0 scroll */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            padding: 10px 16px 20px 16px;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            /* El teclado ocupará el 60% de la altura real para dar margen */
            height: 60%; 
        }

        button {
            border: none;
            border-radius: 30px;
            width: 100%;
            height: 100%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--btn-num);
            color: var(--text-main);
        }

        .btn-func { background-color: var(--btn-func); }
        .btn-op { background-color: var(--btn-op); color: var(--accent); font-size: 30px; }
        .btn-equal { 
            background-color: #004a77 !important; 
            color: #ffffff !important; 
            grid-row: span 2; 
            border-radius: 32px;
        }

        button:active { filter: brightness(0.9); transform: scale(0.95); }

        /* ZONAS SECRETAS */
        #btn-back-menu { position: absolute; top: 0; right: 0; width: 80px; height: 80px; z-index: 100; }
        #btn-config { position: absolute; top: 0; left: 0; width: 80px; height: 80px; z-index: 100; }
    </style>
</head>
<body>

    <div id="btn-back-menu"></div>
    <div id="btn-config" onclick="abrirConfig()"></div>

    <div class="app-container">
        <div class="display-container">
            <div id="screen">0</div>
        </div>

        <div class="grid">
            <button class="btn-func" onclick="resetCalc()">C</button>
            <button class="btn-op" onclick="setOp('/')">÷</button>
            <button class="btn-op" onclick="setOp('*')">×</button>
            <button class="btn-func" onclick="backspace()">⌫</button>

            <button onclick="numClick('7')">7</button>
            <button onclick="numClick('8')">8</button>
            <button onclick="numClick('9')">9</button>
            <button class="btn-op" onclick="setOp('-')">−</button>

            <button onclick="numClick('4')">4</button>
            <button onclick="numClick('5')">5</button>
            <button onclick="numClick('6')">6</button>
            <button class="btn-op" onclick="setOp('+')">+</button>

            <button onclick="numClick('1')">1</button>
            <button onclick="numClick('2')">2</button>
            <button onclick="numClick('3')">3</button>
            <button class="btn-equal" onclick="calcular()">=</button>

            <button onclick="handleMagicTrigger()">%</button>
            <button onclick="numClick('0')">0</button>
            <button onclick="numClick('.')">,</button>
        </div>
    </div>

    <script>
        // 1. EL TRUCO PARA ELIMINAR EL SCROLL: Calcular el alto real del viewport
        function fixViewportHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        
        window.addEventListener('resize', fixViewportHeight);
        fixViewportHeight();

        // 2. LÓGICA DE LA CALCULADORA (Igual que antes)
        let currentInput = "0", previousInput = "", operation = null;
        let n1 = 0, n2 = 0, tn = 0, modoMagico = false, contadorOps = 0;
        let digitosDif = [], idxDif = 0, clicksPorc = 0;

        const screen = document.getElementById('screen');

        function updateScreen() {
            screen.innerText = currentInput;
            screen.style.fontSize = currentInput.length > 8 ? "45px" : "clamp(50px, 15vw, 85px)";
        }

        function numClick(val) {
            if (modoMagico && contadorOps === 2) {
                if (idxDif < digitosDif.length) {
                    if (idxDif === 0) currentInput = "";
                    currentInput += digitosDif[idxDif];
                    idxDif++;
                }
            } else {
                if (currentInput === "0" && val !== ".") currentInput = val;
                else currentInput += val;
            }
            updateScreen();
        }

        function setOp(op) {
            if (modoMagico) {
                contadorOps++;
                if (contadorOps === 1) {
                    n1 = parseFloat(currentInput);
                    currentInput = "0";
                } else if (contadorOps === 2) {
                    n2 = parseFloat(currentInput);
                    tn = n1 + n2;
                    let f = parseFloat(localStorage.getItem('activeForce')) || 0;
                    digitosDif = (f - tn).toString().split('');
                    idxDif = 0;
                    currentInput = "0";
                }
            } else {
                operation = op; previousInput = currentInput; currentInput = "0";
            }
            updateScreen();
        }

        function calcular() {
            if (modoMagico && contadorOps >= 2) {
                currentInput = (localStorage.getItem('activeForce') || "0");
                modoMagico = false; contadorOps = 0;
            } else {
                const prev = parseFloat(previousInput);
                const curr = parseFloat(currentInput);
                if (isNaN(prev) || isNaN(curr)) return;
                let res;
                switch (operation) {
                    case '+': res = prev + curr; break;
                    case '-': res = prev - curr; break;
                    case '*': res = prev * curr; break;
                    case '/': res = prev / curr; break;
                    default: return;
                }
                currentInput = res.toString();
                operation = null;
            }
            updateScreen();
        }

        function handleMagicTrigger() {
            clicksPorc++;
            if (clicksPorc === 2) {
                modoMagico = true;
                if(navigator.vibrate) navigator.vibrate(40);
                clicksPorc = 0;
            }
        }

        function resetCalc() {
            currentInput = "0"; previousInput = ""; operation = null;
            modoMagico = false; contadorOps = 0; updateScreen();
        }

        function backspace() {
            currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : "0";
            updateScreen();
        }

        function abrirConfig() {
            let n = prompt("Valor a forzar:", localStorage.getItem('activeForce') || "");
            if(n !== null) localStorage.setItem('activeForce', n);
        }

        // SALIDA AL MENÚ (Touch prolongado arriba a la derecha)
        let tBack;
        document.getElementById('btn-back-menu').addEventListener('touchstart', (e) => {
            tBack = setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        });
        document.getElementById('btn-back-menu').addEventListener('touchend', () => clearTimeout(tBack));
    </script>
</body>
</html>
