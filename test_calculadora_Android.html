<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculadora</title>
    <style>
        :root {
            --bg-android: #f7f9fc;
            --text-main: #1a1c1e;
            --btn-num: #e1e2e5;
            --btn-op: #c2e7ff;
            --btn-func: #dae2f0;
            --accent: #004a77;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-android: #1a1c1e;
                --text-main: #e5e3e1;
                --btn-num: #2e3033;
                --btn-op: #004a77;
                --btn-func: #43474e;
                --accent: #d2e4ff;
            }
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: none; 
        }
        
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-android);
            position: fixed;
            font-family: 'Roboto', sans-serif;
            overscroll-behavior: none;
        }

        /* CONTENEDOR MAESTRO */
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* VISOR: Más compacto */
        .display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 10px 35px;
        }

        #screen {
            font-size: clamp(40px, 14vw, 75px);
            font-weight: 300;
            color: var(--text-main);
            margin: 0;
            line-height: 1.2;
        }

        /* TECLADO: Reducido al 55% de la pantalla para evitar scroll */
        .numpad {
            height: 55%; 
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 12px;
            padding: 10px 24px 20px 24px; /* Más margen lateral para reducir botones */
            width: 100%;
            max-width: 450px; /* Ancho máximo para que no se vea gigante en tablets */
            margin: 0 auto;
        }

        button {
            border: none;
            border-radius: 35px; /* Forma de pastilla perfecta */
            font-size: 22px;
            background-color: var(--btn-num);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.1s, transform 0.1s;
        }

        .btn-func { background-color: var(--btn-func); }
        .btn-op { background-color: var(--btn-op); color: var(--accent); font-size: 26px; }
        .btn-equal { 
            background-color: #004a77 !important; 
            color: #ffffff !important; 
            grid-row: span 2; 
        }

        button:active { opacity: 0.7; transform: scale(0.92); }

        /* ZONAS INVISIBLES DE CONTROL */
        #secret-exit { position: absolute; top: 0; right: 0; width: 60px; height: 60px; z-index: 100; }
        #secret-config { position: absolute; top: 0; left: 0; width: 60px; height: 60px; z-index: 100; }
    </style>
</head>
<body>

    <div id="secret-exit"></div>
    <div id="secret-config" onclick="abrirConfig()"></div>

    <div class="wrapper">
        <div class="display">
            <div id="screen">0</div>
        </div>

        <div class="numpad">
            <button class="btn-func" onclick="reset()">C</button>
            <button class="btn-op" onclick="op('/')">÷</button>
            <button class="btn-op" onclick="op('*')">×</button>
            <button class="btn-func" onclick="del()">⌫</button>

            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="btn-op" onclick="op('-')">−</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="btn-op" onclick="op('+')">+</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button class="btn-equal" onclick="calc()">=</button>

            <button onclick="magic()">%</button>
            <button onclick="press('0')">0</button>
            <button onclick="press('.')">,</button>
        </div>
    </div>

    <script>
        let cur = "0", pre = "", oper = null;
        let n1 = 0, n2 = 0, magicMode = false, step = 0;
        let diffArr = [], diffIdx = 0, mClicks = 0;

        function press(v) {
            if (magicMode && step === 2) {
                if (diffIdx < diffArr.length) {
                    if (diffIdx === 0) cur = "";
                    cur += diffArr[diffIdx];
                    diffIdx++;
                }
            } else {
                cur = (cur === "0" && v !== ".") ? v : cur + v;
            }
            document.getElementById('screen').innerText = cur;
        }

        function op(o) {
            if (magicMode) {
                step++;
                if (step === 1) { n1 = parseFloat(cur); cur = "0"; }
                else if (step === 2) {
                    n2 = parseFloat(cur);
                    let target = parseFloat(localStorage.getItem('forceVal')) || 0;
                    diffArr = (target - (n1 + n2)).toString().split('');
                    diffIdx = 0; cur = "0";
                }
            } else {
                oper = o; pre = cur; cur = "0";
            }
        }

        function calc() {
            if (magicMode && step >= 2) {
                cur = localStorage.getItem('forceVal') || "0";
                magicMode = false; step = 0;
            } else {
                try {
                    let res = eval(pre + oper + cur);
                    cur = res.toString();
                } catch(e) { cur = "0"; }
            }
            document.getElementById('screen').innerText = cur;
        }

        function magic() {
            mClicks++;
            if (mClicks === 2) {
                magicMode = true;
                if(navigator.vibrate) navigator.vibrate(40);
                mClicks = 0;
            }
        }

        function reset() { cur = "0"; magicMode = false; step = 0; document.getElementById('screen').innerText = cur; }
        function del() { cur = cur.length > 1 ? cur.slice(0, -1) : "0"; document.getElementById('screen').innerText = cur; }

        function abrirConfig() {
            let v = prompt("Número a forzar:", localStorage.getItem('forceVal') || "");
            if(v !== null) localStorage.setItem('forceVal', v);
        }

        let t;
        document.getElementById('secret-exit').addEventListener('touchstart', () => {
            t = setTimeout(() => window.location.href='index.html', 2000);
        });
        document.getElementById('secret-exit').addEventListener('touchend', () => clearTimeout(t));
    </script>
</body>
</html>
