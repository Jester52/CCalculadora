<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculadora</title>
    <style>
        :root {
            --bg-android: #f7f9fc;
            --text-main: #1a1c1e;
            --btn-num: #e1e2e5;
            --btn-op: #c2e7ff;
            --btn-func: #dae2f0;
            --accent: #004a77;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-android: #1a1c1e;
                --text-main: #e5e3e1;
                --btn-num: #2e3033;
                --btn-op: #004a77;
                --btn-func: #43474e;
                --accent: #d2e4ff;
            }
        }

        /* BLOQUEO TOTAL DE MOVIMIENTO EXTERNO */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
            touch-action: none; /* Bloquea gestos del navegador */
        }
        
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prohibido el scroll */
            background-color: var(--bg-android);
            position: fixed; /* Anclado al viewport */
            font-family: 'Roboto', sans-serif;
        }

        /* CONTENEDOR DIVIDIDO EN PORCENTAJES EXACTOS */
        .app-container {
            display: grid;
            grid-template-rows: 35% 65%; /* 100% exacto */
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* VISOR: Ocupa el 35% superior */
        .display-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 0 32px 15px 32px;
            background: transparent;
        }

        #screen {
            font-size: clamp(50px, 15vw, 85px);
            font-weight: 300;
            color: var(--text-main);
            margin: 0;
            line-height: 1;
        }

        /* TECLADO: Ocupa el 65% inferior */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            padding: 5px 16px 15px 16px; /* Padding controlado */
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        button {
            border: none;
            border-radius: 30px;
            width: 100%;
            height: 100%; /* Se adapta a la celda del grid */
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--btn-num);
            color: var(--text-main);
        }

        .btn-func { background-color: var(--btn-func); }
        .btn-op { background-color: var(--btn-op); color: var(--accent); font-size: 28px; }
        .btn-equal { 
            background-color: #004a77 !important; 
            color: #ffffff !important; 
            grid-row: span 2; 
            border-radius: 30px;
        }

        button:active { filter: brightness(0.9); transform: scale(0.95); }

        /* ZONAS INVISIBLES */
        #btn-back-menu { position: absolute; top: 0; right: 0; width: 60px; height: 60px; z-index: 100; }
        #btn-config { position: absolute; top: 0; left: 0; width: 60px; height: 60px; z-index: 100; }
        #magic-indicator { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 30px; height: 3px; background: var(--text-main); border-radius: 5px; opacity: 0; }

        /* ADMIN PANEL */
        #admin-panel { 
            display: none; position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            background: var(--btn-func); padding: 25px; border-radius: 30px; z-index: 200; width: 85%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); text-align: center;
            touch-action: auto; /* Permitir interacción aquí */
        }
        #admin-panel input { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 12px; font-size: 18px; text-align: center; color: #000; }
    </style>
</head>
<body scroll="no">

    <div id="btn-back-menu"></div>
    <div id="btn-config" onclick="abrirConfig()"></div>
    <div id="magic-indicator"></div>

    <div id="admin-panel">
        <h3 style="margin-top:0; color:var(--text-main)">FORZAR</h3>
        <input type="number" id="valForzado" placeholder="0000">
        <button onclick="cerrarConfig()" style="width:100%; background:var(--accent); color:white; height:45px; border-radius:12px; border:none;">GUARDAR</button>
    </div>

    <div class="app-container">
        <div class="display-container">
            <div id="screen">0</div>
        </div>

        <div class="grid">
            <button class="btn-func" onclick="resetCalc()">C</button>
            <button class="btn-op" onclick="setOp('/')">÷</button>
            <button class="btn-op" onclick="setOp('*')">×</button>
            <button class="btn-func" onclick="backspace()">⌫</button>

            <button onclick="numClick('7')">7</button>
            <button onclick="numClick('8')">8</button>
            <button onclick="numClick('9')">9</button>
            <button class="btn-op" onclick="setOp('-')">−</button>

            <button onclick="numClick('4')">4</button>
            <button onclick="numClick('5')">5</button>
            <button onclick="numClick('6')">6</button>
            <button class="btn-op" onclick="setOp('+')">+</button>

            <button onclick="numClick('1')">1</button>
            <button onclick="numClick('2')">2</button>
            <button onclick="numClick('3')">3</button>
            <button class="btn-equal" onclick="calcular()">=</button>

            <button onclick="handleMagicTrigger()">%</button>
            <button onclick="numClick('0')">0</button>
            <button onclick="numClick('.')">,</button>
        </div>
    </div>

    <script>
        // La lógica de JavaScript permanece igual para asegurar el éxito del efecto.
        let currentInput = "0", previousInput = "", operation = null;
        let n1 = 0, n2 = 0, tn = 0, modoMagico = false, contadorOps = 0;
        let digitosDif = [], idxDif = 0, clicksPorc = 0;

        const screen = document.getElementById('screen');

        function updateScreen() {
            screen.innerText = currentInput;
            screen.style.fontSize = currentInput.length > 8 ? "45px" : "clamp(50px, 15vw, 85px)";
        }

        function numClick(val) {
            if (modoMagico && contadorOps === 2) {
                if (idxDif < digitosDif.length) {
                    if (idxDif === 0) currentInput = "";
                    currentInput += digitosDif[idxDif];
                    idxDif++;
                }
            } else {
                if (currentInput === "0" && val !== ".") currentInput = val;
                else currentInput += val;
            }
            updateScreen();
        }

        function setOp(op) {
            if (modoMagico) {
                contadorOps++;
                if (contadorOps === 1) {
                    n1 = parseFloat(currentInput);
                    currentInput = "0";
                } else if (contadorOps === 2) {
                    n2 = parseFloat(currentInput);
                    tn = n1 + n2;
                    let f = parseFloat(localStorage.getItem('activeForce')) || 0;
                    digitosDif = (f - tn).toString().split('');
                    idxDif = 0;
                    currentInput = "0";
                }
            } else {
                operation = op;
                previousInput = currentInput;
                currentInput = "0";
            }
            updateScreen();
        }

        function calcular() {
            if (modoMagico && contadorOps >= 2) {
                currentInput = (localStorage.getItem('activeForce') || "0");
                document.getElementById('magic-indicator').style.opacity = "0";
                modoMagico = false;
                contadorOps = 0;
            } else {
                const prev = parseFloat(previousInput);
                const curr = parseFloat(currentInput);
                if (isNaN(prev) || isNaN(curr)) return;
                let res;
                switch (operation) {
                    case '+': res = prev + curr; break;
                    case '-': res = prev - curr; break;
                    case '*': res = prev * curr; break;
                    case '/': res = prev / curr; break;
                    default: return;
                }
                currentInput = res.toString();
                operation = null;
            }
            updateScreen();
        }

        function handleMagicTrigger() {
            clicksPorc++;
            if (clicksPorc === 2) {
                modoMagico = true;
                document.getElementById('magic-indicator').style.opacity = "0.2";
                if(navigator.vibrate) navigator.vibrate(40);
                clicksPorc = 0;
            }
        }

        function resetCalc() {
            currentInput = "0"; previousInput = ""; operation = null;
            modoMagico = false; contadorOps = 0;
            document.getElementById('magic-indicator').style.opacity = "0";
            updateScreen();
        }

        function backspace() {
            currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : "0";
            updateScreen();
        }

        function abrirConfig() { document.getElementById('admin-panel').style.display = 'block'; }
        function cerrarConfig() {
            let val = document.getElementById('valForzado').value;
            if(val) localStorage.setItem('activeForce', val);
            document.getElementById('admin-panel').style.display = 'none';
        }

        let tBack;
        document.getElementById('btn-back-menu').addEventListener('touchstart', (e) => {
            tBack = setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        });
        document.getElementById('btn-back-menu').addEventListener('touchend', () => clearTimeout(tBack));
    </script>
</body>
</html>
